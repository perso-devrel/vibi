name: iosApp
options:
  bundleIdPrefix: com.vibi
  deploymentTarget:
    iOS: "17.2"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    CODE_SIGN_STYLE: Automatic

# Google Sign-In iOS SDK. SPM 으로 추가 — CocoaPods 미사용.
packages:
  GoogleSignIn:
    url: https://github.com/google/GoogleSignIn-iOS
    from: 8.0.0

targets:
  iosApp:
    type: application
    platform: iOS
    sources:
      - path: iosApp
    dependencies:
      - package: GoogleSignIn
        product: GoogleSignIn
    info:
      path: iosApp/Info.plist
      properties:
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        CADisableMinimumFrameDurationOnPhone: true
        NSPhotoLibraryUsageDescription: 편집할 동영상을 선택하기 위해 사진 라이브러리 접근이 필요합니다.
        NSPhotoLibraryAddUsageDescription: 완성된 동영상을 사진 라이브러리에 저장하기 위해 권한이 필요합니다.
        NSMicrophoneUsageDescription: 음원을 즉시 녹음해 타임라인에 삽입하기 위해 마이크 권한이 필요합니다.
        # UILaunchScreen 누락 시 iOS 가 320×480 호환 모드로 앱을 강제 — 화면 작게 잘림.
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        # UIScene lifecycle 채택 — iOS 가 곧 강제. AppDelegate 는 앱 단위,
        # SceneDelegate 는 window/URL 단위로 분리.
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
          UISceneConfigurations:
            UIWindowSceneSessionRoleApplication:
              - UISceneConfigurationName: Default Configuration
                UISceneDelegateClassName: $(PRODUCT_MODULE_NAME).SceneDelegate
        # Google Sign-In + BFF 주소는 Configs/Auth.xcconfig 의 빌드 설정을 expand.
        # 코드/plist 어디에도 client id / URL 을 직접 적지 않는다.
        GIDClientID: $(GOOGLE_OAUTH_IOS_CLIENT_ID)
        BFFBaseURL: $(BFF_BASE_URL)
        CFBundleURLTypes:
          - CFBundleTypeRole: Editor
            CFBundleURLSchemes:
              - $(GOOGLE_OAUTH_IOS_REVERSED_CLIENT_ID)
    configFiles:
      Debug: Configs/Auth.xcconfig
      Release: Configs/Auth.xcconfig
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.vibi.ios
        # Personal Team (무료 Apple ID) 도 development install 가능. Xcode 가 등록된 Apple ID 의
        # Personal Team 을 자동 매칭. Team ID 명시 제거 — 개발자별/머신별로 다름.
        FRAMEWORK_SEARCH_PATHS:
          - "$(SRCROOT)/../cmp/build/bin/$(KOTLIN_FRAMEWORK_BUILD_TYPE_DIR)/debugFramework"
          - "$(SRCROOT)/../shared/build/bin/$(KOTLIN_FRAMEWORK_BUILD_TYPE_DIR)/debugFramework"
        # destination 별 framework 경로 분기 — Xcode 가 EFFECTIVE_PLATFORM_NAME 을
        # iphonesimulator / iphoneos 로 자동 set, 우리는 그에 맞는 KMP target 디렉터리를 매핑.
        KOTLIN_FRAMEWORK_BUILD_TYPE_DIR: $(KOTLIN_FRAMEWORK_BUILD_TYPE_DIR_$(EFFECTIVE_PLATFORM_NAME))
        KOTLIN_FRAMEWORK_BUILD_TYPE_DIR_iphonesimulator: iosSimulatorArm64
        KOTLIN_FRAMEWORK_BUILD_TYPE_DIR_iphoneos: iosArm64
        OTHER_LDFLAGS:
          - "-framework"
          - "Cmp"
          - "-framework"
          - "Shared"
        ENABLE_BITCODE: NO
    preBuildScripts:
      - name: "Verify Auth.xcconfig"
        # Auth.xcconfig (gitignore) 누락 시 build 가 silent 하게 빈 plist 생성하고 런타임에 깨짐.
        # 명시적으로 fail 하고 template 로 안내.
        basedOnDependencyAnalysis: false
        script: |
          if [ ! -f "$SRCROOT/Configs/Auth.xcconfig" ]; then
            echo "error: Configs/Auth.xcconfig is missing. Copy Configs/Auth.xcconfig.template and fill in your Google OAuth client id + BFF base URL." >&2
            exit 1
          fi
      - name: "Build Kotlin frameworks"
        # outputs 는 명시하지 않음 (KMP source 가 변경되면 framework 가 stale 인데 outputs 만으로는
        # 그걸 감지 못 함). 대신 gradle 자체의 incremental + configuration-cache 로 빠르게.
        # `--no-configuration-cache` 제거 — gradle.properties 의 cc 옵션을 살려 매 호출 5–10s 절감.
        basedOnDependencyAnalysis: false
        script: |
          cd "$SRCROOT/.."
          ./gradlew :cmp:embedAndSignAppleFrameworkForXcode :shared:embedAndSignAppleFrameworkForXcode
